<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0; url=https://prep101.site/app/stripe/success" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #14b8a6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(20, 184, 166, 0.18), transparent 38%),
        linear-gradient(180deg, #0b1120 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    a {
      display: inline-block;
      margin-top: 22px;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #042f2e;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Redirecting to your purchase confirmation</h1>
    <p>If the page does not move automatically, continue to the Prep101 success page.</p>
    <a href="https://prep101.site/app/stripe/success">Continue</a>
  </main>
</body>
</html>

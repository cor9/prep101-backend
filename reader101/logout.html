<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader101 — Signing Out</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080d14;
      color: #e2e8f0;
      font-family: Inter, system-ui, sans-serif;
    }
    p {
      color: rgba(226, 232, 240, 0.72);
      font-size: 15px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <p>Signing you out…</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var next = params.get('next') || 'https://prep101.site/';

      try {
        localStorage.removeItem('ca101_token');
      } catch (_) {}

      try {
        sessionStorage.removeItem('reader101_bootstrap');
      } catch (_) {}

      window.location.replace(next);
    })();
  </script>
</body>
</html>
